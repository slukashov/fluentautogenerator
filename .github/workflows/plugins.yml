name: Publish Plugin to JetBrains

on:
  push:
    branches: [ main ]

jobs:
  publish:
    name: Build and Publish Plugin
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Fetch Sources
        uses: actions/checkout@v4

      # 2. Set up the Java environment
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      # 3. Cache and setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Build and verify just to be safe before publishing
      - name: Build and Verify Plugin
        run: ./gradlew buildPlugin verifyPlugin

      # 5. Publish to the JetBrains Marketplace
      - name: Publish Plugin
        # We map the GitHub Secret to the environment variable Gradle is looking for
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: ./gradlew publishPlugin